<!--
╔══════════════════════════════════════════════════════════════════╗
║  WP VIDEO STORIES — Bloc HTML WordPress                        ║
║  Vidéos verticales avec défilement type réseaux sociaux        ║
║                                                                ║
║  INSTALLATION :                                                ║
║  1. Uploadez wp-video-stories.js dans votre thème             ║
║     ou dans /wp-content/uploads/                              ║
║  2. Copiez tout ce code dans un bloc "HTML personnalisé"      ║
║  3. Remplacez les URLs des vidéos par les vôtres              ║
║  4. Adaptez les noms, avatars et légendes                     ║
║                                                                ║
║  TIPS :                                                        ║
║  - Format vidéo recommandé : MP4, ratio 9:16                  ║
║  - Taille max recommandée : 10-15 Mo par vidéo                ║
║  - Poster = image affichée avant lecture                       ║
╚══════════════════════════════════════════════════════════════════╝
-->

<!-- Les styles sont injectés automatiquement par wp-video-stories.js -->


<!-- ═══════════════════════════════════════════════ -->
<!-- ═══ BLOC STORIES — MODIFIEZ VOS VIDÉOS ICI ═══ -->
<!-- ═══════════════════════════════════════════════ -->

<div data-wp-video-stories>

  <!--
    CHAQUE STORY = un élément <div class="vs-story-data">
    
    Attributs disponibles :
    ─────────────────────────────────────────────
    data-video    = URL de la vidéo MP4 (obligatoire)
    data-poster   = URL de l'image de couverture (recommandé)
    data-user     = Nom affiché
    data-avatar   = URL de la photo de profil (optionnel, sinon initiales)
    data-caption  = Texte affiché en bas
    data-color    = Couleur de l'avatar si pas de photo (#hex)
  -->

  <!-- Story 1 -->
  <div class="vs-story-data"
    data-video="https://votre-site.com/wp-content/uploads/video-1.mp4"
    data-poster="https://votre-site.com/wp-content/uploads/poster-1.jpg"
    data-user="Marie Laurent"
    data-caption="Découvrez notre nouvelle collection printemps 2026 ✨"
    data-color="#534AB7">
  </div>

  <!-- Story 2 -->
  <div class="vs-story-data"
    data-video="https://votre-site.com/wp-content/uploads/video-2.mp4"
    data-poster="https://votre-site.com/wp-content/uploads/poster-2.jpg"
    data-user="Thomas Faure"
    data-caption="Comment utiliser notre nouveau dashboard en 3 étapes simples"
    data-color="#1D9E75">
  </div>

  <!-- Story 3 -->
  <div class="vs-story-data"
    data-video="https://votre-site.com/wp-content/uploads/video-3.mp4"
    data-poster="https://votre-site.com/wp-content/uploads/poster-3.jpg"
    data-user="Sophie Bernard"
    data-caption="Visite exclusive de notre atelier de fabrication 🏭"
    data-color="#D85A30">
  </div>

  <!-- Story 4 -->
  <div class="vs-story-data"
    data-video="https://votre-site.com/wp-content/uploads/video-4.mp4"
    data-poster="https://votre-site.com/wp-content/uploads/poster-4.jpg"
    data-user="Claire Lefebvre"
    data-caption="Mon expérience avec le programme fidélité 💜"
    data-color="#D4537E">
  </div>

  <!--
    AJOUTER UNE STORY : copiez-collez un bloc ci-dessus
    et modifiez les attributs data-*
  -->

</div>
