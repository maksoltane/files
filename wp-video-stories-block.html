<!--
╔══════════════════════════════════════════════════════════════════╗
║  WP VIDEO STORIES — Bloc HTML WordPress                        ║
║  Vidéos verticales avec défilement type réseaux sociaux        ║
║                                                                ║
║  INSTALLATION :                                                ║
║  1. Uploadez wp-video-stories.js dans votre thème             ║
║     ou dans /wp-content/uploads/                              ║
║  2. Copiez tout ce code dans un bloc "HTML personnalisé"      ║
║  3. Remplacez les URLs des vidéos par les vôtres              ║
║  4. Adaptez les noms, avatars et légendes                     ║
║                                                                ║
║  TIPS :                                                        ║
║  - Format vidéo recommandé : MP4, ratio 9:16                  ║
║  - Taille max recommandée : 10-15 Mo par vidéo                ║
║  - Poster = image affichée avant lecture                       ║
╚══════════════════════════════════════════════════════════════════╝
-->

<!-- ═══ STYLES ═══ -->
<style>
/* ── Container principal ── */
.vs-wrapper {
  position: relative;
  width: 100%;
  max-width: 420px;
  margin: 2rem auto;
  aspect-ratio: 9 / 16;
  border-radius: 16px;
  overflow: hidden;
  background: #000;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
}

/* Pleine largeur sur mobile */
@media (max-width: 480px) {
  .vs-wrapper {
    max-width: 100%;
    border-radius: 0;
    margin: 0;
    height: 100vh;
    height: 100dvh;
    aspect-ratio: unset;
  }
}

/* ── Container scrollable ── */
.vs-scroll-container {
  width: 100%;
  height: 100%;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.vs-scroll-container::-webkit-scrollbar {
  display: none;
}

/* ── Chaque slide / story ── */
.vs-slide {
  width: 100%;
  height: 100%;
  scroll-snap-align: start;
  scroll-snap-stop: always;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
  cursor: pointer;
  -webkit-user-select: none;
  user-select: none;
}

/* ── Vidéo ── */
.vs-video {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ── Overlay bas (nom + caption) ── */
.vs-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 60px 16px 28px;
  background: linear-gradient(to top, rgba(0, 0, 0, 0.75) 0%, transparent 100%);
  z-index: 2;
  pointer-events: none;
}

.vs-user {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.vs-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 2px solid rgba(255, 255, 255, 0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: #fff;
  overflow: hidden;
  flex-shrink: 0;
}

.vs-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.vs-username {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: #fff;
  text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
}

.vs-caption {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 13px;
  color: rgba(255, 255, 255, 0.9);
  line-height: 1.45;
  margin: 0;
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
  max-width: 85%;
}

/* ── Barre de progression ── */
.vs-progress-bar {
  position: absolute;
  top: 12px;
  left: 12px;
  right: 12px;
  display: flex;
  gap: 4px;
  z-index: 5;
  pointer-events: none;
}

.vs-progress-seg {
  flex: 1;
  height: 2.5px;
  border-radius: 2px;
  background: rgba(255, 255, 255, 0.25);
  overflow: hidden;
}

.vs-progress-seg.vs-past {
  background: rgba(255, 255, 255, 0.9);
}

.vs-progress-seg.vs-active .vs-progress-fill {
  background: rgba(255, 255, 255, 0.9);
}

.vs-progress-fill {
  height: 100%;
  width: 0;
  border-radius: 2px;
  transition: width 0.2s linear;
}

/* ── Boutons d'action (droite) ── */
.vs-actions {
  position: absolute;
  right: 14px;
  bottom: 120px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  z-index: 3;
}

.vs-action-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: none;
  background: rgba(255, 255, 255, 0.12);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.15s ease, background 0.15s ease;
  padding: 0;
  color: #fff;
}

.vs-action-btn svg {
  width: 20px;
  height: 20px;
}

.vs-action-btn:hover {
  transform: scale(1.12);
  background: rgba(255, 255, 255, 0.22);
}

.vs-action-btn:active {
  transform: scale(0.95);
}

.vs-action-btn.vs-liked {
  color: #ff3b5c;
}

.vs-action-btn.vs-liked svg {
  animation: vs-heartPop 0.35s ease;
}

@keyframes vs-heartPop {
  0% { transform: scale(1); }
  50% { transform: scale(1.35); }
  100% { transform: scale(1); }
}

/* ── Indicateur play/pause central ── */
.vs-play-indicator {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 4;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s ease, transform 0.2s ease;
  color: #fff;
}

.vs-play-indicator svg {
  width: 28px;
  height: 28px;
}

.vs-play-indicator.vs-show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

/* ── Bouton mute ── */
.vs-mute-btn {
  position: absolute;
  top: 36px;
  right: 14px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: rgba(0, 0, 0, 0.45);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 5;
  transition: transform 0.15s ease;
  padding: 0;
  color: #fff;
}

.vs-mute-btn svg {
  width: 16px;
  height: 16px;
}

.vs-mute-btn:hover {
  transform: scale(1.1);
}

/* ── Hint de scroll ── */
.vs-scroll-hint {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  animation: vs-bounce 1.5s infinite ease-in-out;
  pointer-events: none;
  transition: opacity 0.3s ease;
  color: rgba(255, 255, 255, 0.55);
}

.vs-scroll-hint svg {
  width: 22px;
  height: 22px;
}

@keyframes vs-bounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-8px); }
}
</style>

    data-video    = URL de la vidéo MP4 (obligatoire)
    data-poster   = URL de l'image de couverture (recommandé)
    data-user     = Nom affiché
    data-avatar   = URL de la photo de profil (optionnel, sinon initiales)
