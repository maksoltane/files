<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Test — WP Video Shorts Carousel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 16px 0;
      -webkit-font-smoothing: antialiased;
    }

    h1 {
      text-align: center;
      font-size: clamp(18px, 4.5vw, 24px);
      color: #222;
      margin-bottom: 4px;
      padding: 0 16px;
    }

    p.subtitle {
      text-align: center;
      color: #777;
      font-size: clamp(12px, 3vw, 14px);
      margin-bottom: clamp(16px, 4vw, 32px);
      padding: 0 16px;
    }

    section {
      max-width: 1200px;
      margin: 0 auto clamp(24px, 5vw, 60px);
    }

    section h2 {
      font-size: clamp(15px, 3.5vw, 18px);
      color: #333;
      margin-bottom: clamp(10px, 2.5vw, 16px);
      padding-left: 16px;
      border-left: 3px solid #e74c8b;
    }

    /* Carousel edge-to-edge sur mobile, padding sur desktop */
    [data-wp-video-shorts] {
      padding: 0 12px;
    }

    .dark-section {
      background: #1a1a1a;
      border-radius: 0;
      padding: clamp(16px, 4vw, 30px) 0;
      margin-left: 0;
      margin-right: 0;
    }

    .dark-section h2 {
      color: #fff;
      padding-left: 16px;
    }

    .dark-section [data-wp-video-shorts] {
      padding: 0 12px;
    }

    /* ─── SM 640px+ ─── */
    @media (min-width: 640px) {
      body { padding: 24px 0; }

      [data-wp-video-shorts] { padding: 0 20px; }
      .dark-section [data-wp-video-shorts] { padding: 0 20px; }

      section h2 { padding-left: 24px; }
      .dark-section h2 { padding-left: 24px; }

      .dark-section {
        border-radius: 12px;
        margin-left: 16px;
        margin-right: 16px;
      }
    }

    /* ─── MD 768px+ ─── */
    @media (min-width: 768px) {
      body { padding: 32px 0; }

      section { padding: 0; }
      [data-wp-video-shorts] { padding: 0; }
      .dark-section [data-wp-video-shorts] { padding: 0 24px; }

      section h2 { padding-left: 4px; margin-left: 0; }

      .dark-section {
        border-radius: 16px;
        padding: 30px 0;
        margin-left: auto;
        margin-right: auto;
      }
      .dark-section h2 { padding-left: 28px; }
    }

    /* ─── LG 1024px+ ─── */
    @media (min-width: 1024px) {
      body { padding: 40px 20px; }
    }
  </style>
</head>
